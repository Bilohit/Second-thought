<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Theme tuner — Second Thought (for_sonnet.md §4)</title>
<style>
  :root {
    --ui-bg: #0d0d0d; --ui-surface: #181818; --ui-border: #2c2c2c; --ui-text: #e8e8e8; --ui-text-3: #8a8a8a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; background: var(--ui-bg); color: var(--ui-text);
    font-family: "Geist Mono", ui-monospace, "Segoe UI Mono", monospace;
    font-size: 13px;
  }
  body { display: flex; height: 100vh; overflow: hidden; }

  /* ── Left: controls ───────────────────────────────────────────────────── */
  #controls { width: 380px; flex: none; border-right: 1px solid var(--ui-border); overflow-y: auto; padding: 16px; }
  #controls h1 { font-size: 14px; margin: 0 0 4px; }
  #controls .hint { font-size: 10.5px; color: var(--ui-text-3); margin: 0 0 12px; line-height: 1.5; }
  #themeSelect { width: 100%; padding: 6px 8px; background: var(--ui-surface); color: var(--ui-text); border: 1px solid var(--ui-border); margin-bottom: 14px; font-family: inherit; font-size: 12px; }

  .var-row-wrap { border-bottom: 1px solid var(--ui-border); padding: 6px 4px; cursor: default; }
  .var-row-wrap:hover { background: rgba(106, 163, 255, 0.08); }
  .var-row { display: flex; align-items: center; gap: 6px; }
  .var-row label { width: 96px; flex: none; font-size: 11px; color: var(--ui-text-3); }
  .var-row input[type="color"] { width: 28px; height: 24px; padding: 0; border: 1px solid var(--ui-border); background: none; cursor: pointer; }
  .var-row input[type="text"] { flex: 1; min-width: 0; background: var(--ui-surface); color: var(--ui-text); border: 1px solid var(--ui-border); padding: 4px 6px; font-family: inherit; font-size: 11px; }
  .var-row input[type="range"] { width: 56px; flex: none; }
  .var-row .alpha-val { width: 30px; flex: none; font-size: 10px; color: var(--ui-text-3); text-align: right; }
  .usage-text { font-size: 10px; color: #6a8aab; margin: 4px 0 0 102px; line-height: 1.4; }

  .contrast-flag { font-size: 10px; color: #ff8a65; margin: 4px 0 0 102px; }
  .contrast-ok { font-size: 10px; color: #4ade80; margin: 4px 0 0 102px; }

  #copyBtns { display: flex; gap: 8px; margin-top: 16px; }
  #copyBtns button { flex: 1; padding: 8px; background: var(--ui-surface); border: 1px solid var(--ui-border); color: var(--ui-text); cursor: pointer; font-family: inherit; font-size: 11px; }
  #copyBtns button:hover { border-color: #6aa3ff; }
  #copyStatus { font-size: 10px; color: #4ade80; margin-top: 6px; min-height: 12px; }

  /* ── Right: preview ───────────────────────────────────────────────────── */
  #previewWrap { flex: 1; overflow-y: auto; padding: 24px; display: flex; gap: 24px; flex-wrap: wrap; align-content: flex-start; }
  .preview-surround { width: 380px; padding: 24px; border-radius: 4px; }
  .preview-surround.dark-surround { background: #050505; }
  .preview-surround.light-surround { background: #e2e2e2; }
  .surround-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 10px; }

  /* highlight ring applied to preview elements whose vars are being hovered in the controls panel */
  .var-highlight { outline: 2px solid #6aa3ff !important; outline-offset: 2px; }

  /* ── app backdrop — demonstrates --bg (the part visible behind every panel) ── */
  .pv-app-frame { background: var(--bg); padding: 18px; }

  .pv-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 0; }
  .pv-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border-2); color: var(--text-1); font-size: 12px; font-weight: 600; }
  .pv-header .x { color: var(--text-3); cursor: pointer; }
  .pv-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  .pv-btn-row { display: flex; gap: 8px; }
  .pv-btn-primary { padding: 6px 16px; font-size: 12px; font-weight: 600; border: none; background: var(--accent); color: var(--on-accent); cursor: pointer; width: fit-content; }
  .pv-btn-secondary { padding: 6px 12px; font-size: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); cursor: pointer; width: fit-content; }
  .pv-btn-danger { padding: 6px 12px; font-size: 12px; border: 1px solid var(--red); background: var(--surface); color: var(--red); cursor: pointer; width: fit-content; }

  .pv-toggle { display: flex; gap: 4px; width: fit-content; }
  .pv-toggle span { padding: 5px 10px; font-size: 11px; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); }
  .pv-toggle span.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }

  .pv-card { background: var(--surface); border: 1px solid var(--border); padding: 8px 10px; color: var(--text-1); font-size: 11px; }
  .pv-card .conf-badge { display: inline-block; margin-top: 5px; padding: 1px 6px; font-size: 9px; border: 1px solid var(--yellow); color: var(--yellow); }
  .pv-divider { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border-2); color: var(--text-2); font-size: 11px; }
  .pv-input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); padding: 5px 8px; font-size: 11px; font-family: inherit; }

  .pv-capsule-closed { display: inline-flex; align-items: center; height: 30px; padding: 0 10px; border: 1px solid var(--border); background: var(--surface); border-radius: 15px; gap: 6px; }
  .pv-capsule-closed .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .pv-capsule-closed .label { font-size: 11px; color: var(--text-1); }

  .pv-capsule-open { display: inline-flex; align-items: center; height: 30px; padding: 0 6px; border: 1px solid var(--border); background: var(--surface); border-radius: 15px; gap: 2px; }
  .pv-capsule-open .icon { width: 26px; height: 22px; display: flex; align-items: center; justify-content: center; color: var(--text-3); border-radius: 6px; font-size: 11px; }
  .pv-capsule-open .icon.hot { background: var(--accent-d); color: var(--text-1); }
  .pv-capsule-open .icon.danger-hot { background: var(--accent-d); color: var(--red); }

  /* ── radial/minimal-pill chrome — uses --palette-bg, distinct from panel --surface ── */
  .pv-minimal-row { display: flex; align-items: center; gap: 10px; padding: 8px; background: var(--bg); }
  .pv-pill-dot { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: var(--palette-bg); box-shadow: 0 0 0 3px var(--accent-glow); }
  .pv-spoke { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: var(--palette-bg); color: var(--text-1); display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .pv-spoke.hover-state { border-color: var(--accent); background: var(--accent-d); }

  /* ── modal scrim — full-screen dim behind dialogs ── */
  .pv-scrim-demo { position: relative; height: 64px; border: 1px solid var(--border); overflow: hidden; }
  .pv-scrim-demo .backdrop-content { position: absolute; inset: 0; background: repeating-linear-gradient(45deg, var(--surface), var(--surface) 6px, var(--surface-2) 6px, var(--surface-2) 12px); }
  .pv-scrim-demo .scrim-layer { position: absolute; inset: 0; background: var(--scrim); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text-1); }
</style>
</head>
<body>
  <div id="controls">
    <h1>Theme tuner</h1>
    <p class="hint">Hover any row below to highlight exactly where that variable is used in the preview. Every variable is wired to a visible element — nothing is decorative-only.</p>
    <select id="themeSelect"></select>

    <div id="varList"></div>

    <div id="copyBtns">
      <button id="copyOne">Copy CSS (this theme)</button>
      <button id="copyAll">Copy all themes</button>
    </div>
    <div id="copyStatus"></div>
  </div>

  <div id="previewWrap">
    <div class="preview-surround dark-surround">
      <div class="surround-label">on dark surround</div>
      <div id="previewDark"></div>
    </div>
    <div class="preview-surround light-surround">
      <div class="surround-label">on light surround</div>
      <div id="previewLight"></div>
    </div>
  </div>

<script>
// ── Seed data — exact current values from gui/src/index.css ───────────────
const THEMES = {
  dark: { colorScheme: "dark", vars: {
    "--bg": "#0a0a0a", "--surface": "#262626", "--surface-2": "#404040", "--border": "#383838", "--border-2": "#262626",
    "--text-1": "#fafafa", "--text-2": "#a1a1a1", "--text-3": "#737373",
    "--accent": "#737373", "--accent-d": "rgba(115,115,115,0.18)", "--accent-glow": "rgba(115,115,115,0.30)", "--on-accent": "#fafafa",
    "--green": "#4ade80", "--yellow": "#facc15", "--red": "#ff6467",
    "--glass-bg": "#191919", "--glass-border": "#383838", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.40)",
    "--palette-bg": "#262626", "--scrim": "rgba(0,0,0,0.55)",
  }},
  light: { colorScheme: "light", vars: {
    "--bg": "#ffffff", "--surface": "#f5f5f5", "--surface-2": "#cccccc", "--border": "#c7c7c7", "--border-2": "#d2d2d2",
    "--text-1": "#0a0a0a", "--text-2": "#4f4f4f", "--text-3": "#636363",
    "--accent": "#737373", "--accent-d": "rgba(115,115,115,0.10)", "--accent-glow": "rgba(115,115,115,0.22)", "--on-accent": "#fafafa",
    "--green": "#16a34a", "--yellow": "#92660a", "--red": "#e7000b",
    "--glass-bg": "#ffffff", "--glass-border": "#c7c7c7", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.08)",
    "--palette-bg": "#ffffff", "--scrim": "rgba(0,0,0,0.25)",
  }},
  sage: { colorScheme: "light", vars: {
    "--bg": "#f6f8f3", "--surface": "#e9efe1", "--surface-2": "#dde6d1", "--border": "#cddabd", "--border-2": "#e3ead7",
    "--text-1": "#28331f", "--text-2": "#5c6b4c", "--text-3": "#59604d",
    "--accent": "#7fa05f", "--accent-d": "rgba(127,160,95,0.12)", "--accent-glow": "rgba(127,160,95,0.24)", "--on-accent": "#f8fbf3",
    "--green": "#16a34a", "--yellow": "#92660a", "--red": "#e7000b",
    "--glass-bg": "#ffffff", "--glass-border": "#cddabd", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.08)",
    "--palette-bg": "#e9efe1", "--scrim": "rgba(0,0,0,0.25)",
  }},
  sky: { colorScheme: "light", vars: {
    "--bg": "#eef6fb", "--surface": "#d7ebf5", "--surface-2": "#c0deee", "--border": "#a8cfe3", "--border-2": "#cfe6f1",
    "--text-1": "#122a36", "--text-2": "#3c6b82", "--text-3": "#49626f",
    "--accent": "#1f7fb3", "--accent-d": "rgba(31,127,179,0.12)", "--accent-glow": "rgba(31,127,179,0.24)", "--on-accent": "#f3fafd",
    "--green": "#16a34a", "--yellow": "#92660a", "--red": "#ff000d",
    "--glass-bg": "#ffffff", "--glass-border": "#a8cfe3", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.08)",
    "--palette-bg": "#d7ebf5", "--scrim": "rgba(0,0,0,0.25)",
  }},
  "bubba-pink": { colorScheme: "light", vars: {
    "--bg": "#fdf6f8", "--surface": "#f6e6ec", "--surface-2": "#efd5df", "--border": "#e2bdca", "--border-2": "#f1dee5",
    "--text-1": "#371b24", "--text-2": "#7a4655", "--text-3": "#a8788a",
    "--accent": "#a2556f", "--accent-d": "rgba(162,85,111,0.12)", "--accent-glow": "rgba(162,85,111,0.24)", "--on-accent": "#fdf6f8",
    "--green": "#16a34a", "--yellow": "#92660a", "--red": "#e7000b",
    "--glass-bg": "#ffffff", "--glass-border": "#e2bdca", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.08)",
    "--palette-bg": "#f6e6ec", "--scrim": "rgba(0,0,0,0.25)",
  }},
  mist: { colorScheme: "dark", vars: {
    "--bg": "#181c1d", "--surface": "#232a2b", "--surface-2": "#2f3839", "--border": "#3a4546", "--border-2": "#2a3132",
    "--text-1": "#eef3f3", "--text-2": "#aebcbd", "--text-3": "#7f9293",
    "--accent": "#6cb8b1", "--accent-d": "rgba(108,184,177,0.18)", "--accent-glow": "rgba(108,184,177,0.30)", "--on-accent": "#0d1717",
    "--green": "#4ade80", "--yellow": "#facc15", "--red": "#ff6467",
    "--glass-bg": "#1e2425", "--glass-border": "#3a4546", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.40)",
    "--palette-bg": "#232a2b", "--scrim": "rgba(0,0,0,0.55)",
  }},
  lilac: { colorScheme: "dark", vars: {
    "--bg": "#1c1620", "--surface": "#2a1f30", "--surface-2": "#38293f", "--border": "#44324c", "--border-2": "#332639",
    "--text-1": "#f3eef7", "--text-2": "#c4aed4", "--text-3": "#9683a8",
    "--accent": "#c08fdd", "--accent-d": "rgba(192,143,221,0.18)", "--accent-glow": "rgba(192,143,221,0.30)", "--on-accent": "#170f1b",
    "--green": "#4ade80", "--yellow": "#facc15", "--red": "#ff6467",
    "--glass-bg": "#221a28", "--glass-border": "#44324c", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.40)",
    "--palette-bg": "#2a1f30", "--scrim": "rgba(0,0,0,0.55)",
  }},
  sand: { colorScheme: "dark", vars: {
    "--bg": "#1e1a16", "--surface": "#2c2620", "--surface-2": "#3a3128", "--border": "#463b30", "--border-2": "#332b24",
    "--text-1": "#f5efe6", "--text-2": "#c2af97", "--text-3": "#93826c",
    "--accent": "#cf9e5c", "--accent-d": "rgba(207,158,92,0.18)", "--accent-glow": "rgba(207,158,92,0.30)", "--on-accent": "#19140f",
    "--green": "#4ade80", "--yellow": "#facc15", "--red": "#ff6467",
    "--glass-bg": "#241f1a", "--glass-border": "#463b30", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.40)",
    "--palette-bg": "#2c2620", "--scrim": "rgba(0,0,0,0.55)",
  }},
  wine: { colorScheme: "dark", vars: {
    "--bg": "#160a0e", "--surface": "#241319", "--surface-2": "#321a23", "--border": "#43232d", "--border-2": "#2e171e",
    "--text-1": "#f7e3e9", "--text-2": "#c79aa7", "--text-3": "#8f6470",
    "--accent": "#a8415f", "--accent-d": "rgba(168,65,95,0.18)", "--accent-glow": "rgba(168,65,95,0.30)", "--on-accent": "#fdf2f5",
    "--green": "#4ade80", "--yellow": "#facc15", "--red": "#ff6467",
    "--glass-bg": "#1d0f14", "--glass-border": "#43232d", "--glass-shadow": "0 1px 2px rgba(0,0,0,0.40)",
    "--palette-bg": "#241319", "--scrim": "rgba(0,0,0,0.55)",
  }},
};
const THEME_LABELS = { dark: "Void", light: "Paper", sage: "Sage", sky: "Sky", "bubba-pink": "Bubba Pink", mist: "Mist", lilac: "Lilac", sand: "Sand", wine: "Wine" };
const PROP_ORDER = ["--bg","--surface","--surface-2","--border","--border-2","--text-1","--text-2","--text-3","--accent","--accent-d","--accent-glow","--on-accent","--green","--yellow","--red","--glass-bg","--glass-border","--glass-shadow","--palette-bg","--scrim"];
const RGBA_VARS = new Set(["--accent-d", "--accent-glow", "--scrim"]);
const SHADOW_VARS = new Set(["--glass-shadow"]);

// Where each variable shows up in the preview, in plain language, plus the
// data-var-use selector(s) to highlight when the row is hovered.
const VAR_INFO = {
  "--bg": { usage: "App backdrop visible around/behind every panel.", sel: '[data-pv="app-frame"]' },
  "--surface": { usage: "Default fill for buttons, toggles, cards, capsule pill.", sel: '[data-pv="btn-secondary"], [data-pv="toggle-inactive"], [data-pv="card"], [data-pv="capsule-closed"], [data-pv="capsule-open"], [data-pv="btn-danger"]' },
  "--surface-2": { usage: "Input field fill (one step up from --surface).", sel: '[data-pv="input"]' },
  "--border": { usage: "Default border on buttons, cards, inputs, capsule, spokes.", sel: '[data-pv="btn-secondary"], [data-pv="toggle-inactive"], [data-pv="card"], [data-pv="input"], [data-pv="capsule-closed"], [data-pv="capsule-open"], [data-pv="spoke"], [data-pv="scrim-demo"]' },
  "--border-2": { usage: "Quieter divider lines — panel header rule, list-row separators.", sel: '[data-pv="header"], [data-pv="divider"]' },
  "--text-1": { usage: "Primary text — headings, card titles, capsule label.", sel: '[data-pv="header-title"], [data-pv="card-title"], [data-pv="capsule-label"], [data-pv="hot-icon"], [data-pv="spoke"]' },
  "--text-2": { usage: "Secondary text — inactive toggle label, divider rows, input text.", sel: '[data-pv="toggle-inactive"], [data-pv="divider"], [data-pv="input"], [data-pv="btn-secondary"]' },
  "--text-3": { usage: "Muted/tertiary text — panel close ×, idle capsule icons.", sel: '[data-pv="close-x"], [data-pv="icon"]' },
  "--accent": { usage: "Primary button fill, active toggle segment fill.", sel: '[data-pv="btn-primary"], [data-pv="toggle-active"]' },
  "--accent-d": { usage: "Faint accent tint — hovered/active capsule icon background.", sel: '[data-pv="hot-icon"], [data-pv="spoke-hover"]' },
  "--accent-glow": { usage: "Soft glow ring, e.g. around the minimal pill.", sel: '[data-pv="pill-dot"]' },
  "--on-accent": { usage: "Text drawn on top of --accent fills (primary button, active toggle).", sel: '[data-pv="btn-primary"], [data-pv="toggle-active"]' },
  "--green": { usage: "Status dot — capsule \"healthy / connected\" indicator.", sel: '[data-pv="status-dot"]' },
  "--yellow": { usage: "Medium-confidence classification badge.", sel: '[data-pv="conf-badge"]' },
  "--red": { usage: "Destructive actions & danger icon state (discard, hide).", sel: '[data-pv="btn-danger"], [data-pv="danger-icon"]' },
  "--glass-bg": { usage: "Translucent panel fill (Settings/Inbox/Stats frame).", sel: '[data-pv="panel"]' },
  "--glass-border": { usage: "Panel outer border.", sel: '[data-pv="panel"]' },
  "--glass-shadow": { usage: "Panel drop shadow.", sel: '[data-pv="panel"]' },
  "--palette-bg": { usage: "Radial menu / minimal-pill chrome fill (distinct from panel --surface).", sel: '[data-pv="pill-dot"], [data-pv="spoke"]' },
  "--scrim": { usage: "Full-screen dim layer behind modal panels.", sel: '[data-pv="scrim-layer"]' },
};

let current = "dark";

// ── color helpers ───────────────────────────────────────────────────────
function hexToRgb(hex) {
  const m = hex.replace("#", "").match(/.{1,2}/g).map((h) => parseInt(h, 16));
  return { r: m[0], g: m[1], b: m[2] };
}
function rgbToHex(r, g, b) {
  return "#" + [r, g, b].map((v) => v.toString(16).padStart(2, "0")).join("");
}
function parseRgba(s) {
  const m = s.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*(?:,\s*([\d.]+))?\)/);
  if (!m) return { r: 0, g: 0, b: 0, a: 1 };
  return { r: +m[1], g: +m[2], b: +m[3], a: m[4] !== undefined ? +m[4] : 1 };
}
function parseShadowAlpha(s) {
  const m = s.match(/rgba?\([^)]*,\s*([\d.]+)\)/);
  return m ? +m[1] : 1;
}
function relLuminance(hex) {
  const { r, g, b } = hexToRgb(hex);
  const [R, G, B] = [r, g, b].map((v) => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * R + 0.7152 * G + 0.0722 * B;
}
function contrastRatio(hex1, hex2) {
  const l1 = relLuminance(hex1), l2 = relLuminance(hex2);
  const [lighter, darker] = l1 > l2 ? [l1, l2] : [l2, l1];
  return (lighter + 0.05) / (darker + 0.05);
}

// ── controls rendering ───────────────────────────────────────────────────
const sel = document.getElementById("themeSelect");
Object.keys(THEMES).forEach((k) => {
  const o = document.createElement("option");
  o.value = k; o.textContent = THEME_LABELS[k];
  sel.appendChild(o);
});
sel.value = current;
sel.addEventListener("change", () => { current = sel.value; renderControls(); applyTheme(); });

function applyTheme() {
  const t = THEMES[current];
  const root = document.documentElement;
  PROP_ORDER.forEach((p) => root.style.setProperty(p, t.vars[p]));
  renderPreview();
}

function setHighlight(selector, on) {
  if (!selector) return;
  [document.getElementById("previewDark"), document.getElementById("previewLight")].forEach((container) => {
    container.querySelectorAll(selector).forEach((el) => el.classList.toggle("var-highlight", on));
  });
}

function renderControls() {
  const t = THEMES[current];
  const list = document.getElementById("varList");
  list.innerHTML = "";
  PROP_ORDER.forEach((p) => {
    const wrap = document.createElement("div");
    wrap.className = "var-row-wrap";
    const info = VAR_INFO[p];
    wrap.addEventListener("mouseenter", () => setHighlight(info.sel, true));
    wrap.addEventListener("mouseleave", () => setHighlight(info.sel, false));

    const row = document.createElement("div");
    row.className = "var-row";
    const label = document.createElement("label");
    label.textContent = p;
    row.appendChild(label);

    if (RGBA_VARS.has(p)) {
      const { r, g, b, a } = parseRgba(t.vars[p]);
      const hex = rgbToHex(r, g, b);
      const picker = document.createElement("input"); picker.type = "color"; picker.value = hex;
      const alpha = document.createElement("input"); alpha.type = "range"; alpha.min = 0; alpha.max = 1; alpha.step = 0.01; alpha.value = a;
      const alphaVal = document.createElement("span"); alphaVal.className = "alpha-val"; alphaVal.textContent = a.toFixed(2);
      const text = document.createElement("input"); text.type = "text"; text.value = t.vars[p];
      const update = () => {
        const { r, g, b } = hexToRgb(picker.value);
        const newVal = `rgba(${r},${g},${b},${(+alpha.value).toFixed(2)})`;
        t.vars[p] = newVal; text.value = newVal; alphaVal.textContent = (+alpha.value).toFixed(2);
        document.documentElement.style.setProperty(p, newVal);
      };
      picker.addEventListener("input", update);
      picker.addEventListener("change", update);
      alpha.addEventListener("input", update);
      text.addEventListener("change", () => { t.vars[p] = text.value; document.documentElement.style.setProperty(p, text.value); renderControls(); });
      row.appendChild(picker); row.appendChild(alpha); row.appendChild(alphaVal); row.appendChild(text);
    } else if (SHADOW_VARS.has(p)) {
      const a = parseShadowAlpha(t.vars[p]);
      const alpha = document.createElement("input"); alpha.type = "range"; alpha.min = 0; alpha.max = 1; alpha.step = 0.01; alpha.value = a;
      const alphaVal = document.createElement("span"); alphaVal.className = "alpha-val"; alphaVal.textContent = a.toFixed(2);
      const text = document.createElement("input"); text.type = "text"; text.value = t.vars[p];
      const update = () => {
        const newVal = `0 1px 2px rgba(0,0,0,${(+alpha.value).toFixed(2)})`;
        t.vars[p] = newVal; text.value = newVal; alphaVal.textContent = (+alpha.value).toFixed(2);
        document.documentElement.style.setProperty(p, newVal);
      };
      alpha.addEventListener("input", update);
      text.addEventListener("change", () => { t.vars[p] = text.value; document.documentElement.style.setProperty(p, text.value); });
      row.appendChild(alpha); row.appendChild(alphaVal); row.appendChild(text);
    } else {
      const picker = document.createElement("input"); picker.type = "color"; picker.value = t.vars[p];
      const text = document.createElement("input"); text.type = "text"; text.value = t.vars[p];
      const update = (val) => {
        t.vars[p] = val; document.documentElement.style.setProperty(p, val);
        updateContrastFlags();
      };
      picker.addEventListener("input", () => { text.value = picker.value; update(picker.value); });
      picker.addEventListener("change", () => { text.value = picker.value; update(picker.value); });
      text.addEventListener("change", () => { picker.value = text.value; update(text.value); });
      row.appendChild(picker); row.appendChild(text);
    }
    wrap.appendChild(row);

    const usage = document.createElement("div");
    usage.className = "usage-text";
    usage.textContent = info.usage;
    wrap.appendChild(usage);

    if (p === "--text-1" || p === "--text-2" || p === "--text-3") {
      const flag = document.createElement("div");
      flag.dataset.contrastFor = p;
      wrap.appendChild(flag);
    }

    list.appendChild(wrap);
  });
  updateContrastFlags();
}

function updateContrastFlags() {
  const t = THEMES[current];
  document.querySelectorAll("[data-contrast-for]").forEach((flag) => {
    const p = flag.dataset.contrastFor;
    const ratio = contrastRatio(t.vars[p], t.vars["--surface"]);
    flag.className = ratio >= 4.5 ? "contrast-ok" : "contrast-flag";
    flag.textContent = `contrast vs --surface: ${ratio.toFixed(2)}:1 ${ratio >= 4.5 ? "(AA pass)" : "(below AA 4.5:1)"}`;
  });
}

// ── copy CSS ──────────────────────────────────────────────────────────────
function blockFor(key) {
  const t = THEMES[key];
  const sel = key === "dark" ? `:root,\n[data-theme="dark"]` : `[data-theme="${key}"]`;
  const lines = [`  color-scheme: ${t.colorScheme};`, ...PROP_ORDER.map((p) => `  ${p}:${" ".repeat(Math.max(1, 14 - p.length))}${t.vars[p]};`)];
  return `${sel} {\n${lines.join("\n")}\n}`;
}
function flash(msg) {
  const s = document.getElementById("copyStatus");
  s.textContent = msg;
  setTimeout(() => { if (s.textContent === msg) s.textContent = ""; }, 2000);
}
document.getElementById("copyOne").addEventListener("click", () => {
  navigator.clipboard.writeText(blockFor(current)).then(() => flash(`Copied ${THEME_LABELS[current]} block.`));
});
document.getElementById("copyAll").addEventListener("click", () => {
  const all = Object.keys(THEMES).map(blockFor).join("\n\n");
  navigator.clipboard.writeText(all).then(() => flash("Copied all 9 theme blocks."));
});

renderControls();
applyTheme();
