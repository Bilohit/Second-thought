<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Thought — Dashboard</title>
<style>
  :root {
    --bg:       #0c0c0e;
    --surface:  #141416;
    --border:   rgba(255,255,255,0.07);
    --accent:   #7c6cf6;
    --accent-d: rgba(124,108,246,0.12);
    --text-1:   rgba(255,255,255,0.85);
    --text-2:   rgba(255,255,255,0.45);
    --text-3:   rgba(255,255,255,0.22);
    --green:    #4ade80;
    --yellow:   #facc15;
    --red:      #f87171;
    --radius:   12px;
    --font:     -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:      #f5f5f8;
      --surface: #ffffff;
      --border:  rgba(0,0,0,0.07);
      --text-1:  rgba(0,0,0,0.85);
      --text-2:  rgba(0,0,0,0.50);
      --text-3:  rgba(0,0,0,0.25);
    }
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-1); font-family: var(--font); font-size: 14px; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); gap: 12px; }
  .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 760px) { .container { grid-template-columns: 1fr; } }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2); margin: 0 0 14px; }
  .card.full { grid-column: 1 / -1; }

  /* Stat row */
  .stat-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .stat-big { font-size: 32px; font-weight: 700; color: var(--text-1); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-2); }

  /* Category bars */
  .cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cat-name { width: 130px; font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .cat-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s cubic-bezier(0.16,1,0.3,1); }
  .cat-count { width: 32px; text-align: right; font-size: 12px; color: var(--text-3); flex-shrink: 0; }

  /* Activity feed */
  .feed-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .feed-item:last-child { border-bottom: none; }
  .feed-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
  .feed-body { flex: 1; min-width: 0; }
  .feed-name { font-size: 12px; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feed-meta { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .tag { display: inline-block; font-size: 10px; background: var(--accent-d); color: var(--accent); border-radius: 4px; padding: 1px 6px; margin-left: 4px; }

  /* Activity calendar */
  .cal-grid { display: flex; gap: 3px; flex-wrap: wrap; }
  .cal-day { width: 12px; height: 12px; border-radius: 2px; background: var(--border); cursor: default; transition: background 0.2s; }
  .cal-day[data-count="0"] { background: var(--border); }
  .cal-day[data-count="1"] { background: rgba(124,108,246,0.3); }
  .cal-day[data-count="2"] { background: rgba(124,108,246,0.55); }
  .cal-day[data-count="3"] { background: rgba(124,108,246,0.75); }
  .cal-day[data-count="4"] { background: var(--accent); }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-input { width: 100%; padding: 9px 36px 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-1); font-size: 13px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-3); }
  .search-filter { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text-2); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .filter-btn.active, .filter-btn:hover { background: var(--accent-d); border-color: var(--accent); color: var(--accent); }
  .search-result { padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover .sr-name { color: var(--accent); }
  .sr-name { font-size: 12px; color: var(--text-1); font-weight: 500; }
  .sr-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; display: flex; gap: 8px; }
  .no-results { font-size: 12px; color: var(--text-3); text-align: center; padding: 20px 0; }

  /* Inbox badge */
  .inbox-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; border-radius: 10px; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 0 5px; }
  .inbox-zero { color: var(--text-3); font-size: 12px; }

  /* Refresh button */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 7px; border: 1px solid var(--border); background: none; color: var(--text-2); font-size: 12px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .btn:hover { background: var(--accent-d); border-color: var(--accent); color: var(--accent); }
  .btn.loading svg { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status dot */
  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .status-dot.ok  { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.6); }
  .status-dot.err { background: var(--red); }
  .status-dot.loading { background: var(--yellow); }

  /* Day chart */
  #day-chart { display: flex; align-items: flex-end; gap: 2px; height: 48px; }
  .day-bar { flex: 1; border-radius: 2px 2px 0 0; background: var(--accent); opacity: 0.7; min-height: 2px; transition: height 0.4s cubic-bezier(0.16,1,0.3,1); cursor: default; }
  .day-bar:hover { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">⬡ Second Thought</div>
  <div class="topbar-right">
    <span class="status-dot loading" id="status-dot" title="Checking server…"></span>
    <span id="status-text" style="font-size:12px;color:var(--text-3)">Connecting…</span>
    <button class="btn" id="refresh-btn" onclick="loadAll(true)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="container">

  <!-- Total + Inbox -->
  <div class="card">
    <p class="card-title">Total Captures</p>
    <div class="stat-row">
      <span class="stat-big" id="total-count">—</span>
      <span class="stat-label">notes in vault</span>
    </div>
    <div style="margin-top:14px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;color:var(--text-2)">Review inbox</span>
      <span id="inbox-badge" class="inbox-badge" style="display:none">0</span>
      <span id="inbox-zero" class="inbox-zero" style="display:none">All clear ✓</span>
    </div>
  </div>

  <!-- 30-day activity -->
  <div class="card">
    <p class="card-title">Activity — Last 30 Days</p>
    <div id="day-chart"></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;">
      <span id="day-oldest" style="font-size:10px;color:var(--text-3)"></span>
      <span style="font-size:10px;color:var(--text-3)">today</span>
    </div>
  </div>

  <!-- Category breakdown -->
  <div class="card">
    <p class="card-title">By Category</p>
    <div id="cat-list"><span style="color:var(--text-3);font-size:12px">Loading…</span></div>
  </div>

  <!-- Recent activity -->
  <div class="card">
    <p class="card-title">Recent</p>
    <div id="recent-feed"><span style="color:var(--text-3);font-size:12px">Loading…</span></div>
  </div>

  <!-- Search -->
  <div class="card full">
    <p class="card-title">Search</p>
    <div class="search-wrap">
      <input type="text" class="search-input" id="search-input" placeholder="Full-text search… (FTS5: prefix*, &quot;exact phrase&quot;)" oninput="debouncedSearch()">
    </div>
    <div class="search-filter" id="cat-filters">
      <button class="filter-btn active" onclick="setFilter(null, this)">All</button>
    </div>
    <div id="search-results"><span class="no-results">Type to search your captures</span></div>
  </div>

</div>

<script>
const BASE = 'http://localhost:7070';
let activeFilter = null;
let searchTimer  = null;
const allCategories = [];

async function api(path) {
  const r = await fetch(BASE + path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function ts(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function basename(path) {
  return (path || '').replace(/\\/g, '/').split('/').pop().replace(/\.md$/, '');
}

async function loadStats() {
  const data = await api('/stats');

  // Total
  document.getElementById('total-count').textContent = data.total;

  // Category bars
  const catList = document.getElementById('cat-list');
  catList.innerHTML = '';
  const max = data.by_category[0]?.count || 1;
  for (const row of data.by_category) {
    const pct = Math.round(row.count / max * 100);
    catList.innerHTML += `
      <div class="cat-row">
        <span class="cat-name" title="${row.category}">${row.category}</span>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%"></div></div>
        <span class="cat-count">${row.count}</span>
      </div>`;
    if (!allCategories.includes(row.category)) allCategories.push(row.category);
  }
  buildCatFilters();

  // Day chart
  buildDayChart(data.by_day);

  // Recent feed
  const feed = document.getElementById('recent-feed');
  feed.innerHTML = '';
  for (const r of data.recent) {
    const tags = JSON.parse(r.tags || '[]');
    const tagHtml = tags.map(t => `<span class="tag">${t}</span>`).join('');
    feed.innerHTML += `
      <div class="feed-item">
        <div class="feed-dot"></div>
        <div class="feed-body">
          <div class="feed-name">${basename(r.path)}${tagHtml}</div>
          <div class="feed-meta">
            <span>${r.category}</span>
            <span>${ts(r.timestamp)}</span>
            ${r.source_url ? `<a href="${r.source_url}" target="_blank">source</a>` : ''}
          </div>
        </div>
      </div>`;
  }
  if (!data.recent.length) feed.innerHTML = '<span style="color:var(--text-3);font-size:12px">No captures yet</span>';
}

function buildDayChart(byDay) {
  const chart = document.getElementById('day-chart');
  chart.innerHTML = '';
  if (!byDay.length) return;

  // Normalize to last 30 days keyed by date string
  const map = {};
  for (const d of byDay) map[d.date] = d.count;
  const today = new Date();
  const dates = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }
  const max = Math.max(1, ...Object.values(map));
  for (const date of dates) {
    const cnt = map[date] || 0;
    const h   = Math.round((cnt / max) * 100);
    const bar = document.createElement('div');
    bar.className = 'day-bar';
    bar.style.height = (h || 2) + '%';
    bar.title = `${date}: ${cnt} capture${cnt !== 1 ? 's' : ''}`;
    chart.appendChild(bar);
  }
  if (dates.length) document.getElementById('day-oldest').textContent = dates[0];
}

function buildCatFilters() {
  const wrap = document.getElementById('cat-filters');
  // Reset to just "All"
  wrap.innerHTML = '<button class="filter-btn active" onclick="setFilter(null, this)">All</button>';
  for (const cat of allCategories) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = () => setFilter(cat, btn);
    wrap.appendChild(btn);
  }
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  doSearch();
}

async function loadInbox() {
  try {
    const data = await api('/inbox');
    const badge = document.getElementById('inbox-badge');
    const zero  = document.getElementById('inbox-zero');
    if (data.count > 0) {
      badge.textContent = data.count;
      badge.style.display = 'inline-flex';
      zero.style.display  = 'none';
    } else {
      badge.style.display = 'none';
      zero.style.display  = 'inline';
    }
  } catch { /* inbox may not exist yet */ }
}

async function doSearch() {
  const q   = document.getElementById('search-input').value.trim();
  const wrap = document.getElementById('search-results');
  wrap.innerHTML = '<span class="no-results">Searching…</span>';
  try {
    const url = '/search?limit=30' +
      (q ? `&q=${encodeURIComponent(q)}` : '') +
      (activeFilter ? `&category=${encodeURIComponent(activeFilter)}` : '');
    const data = await api(url);
    wrap.innerHTML = '';
    if (!data.results.length) {
      wrap.innerHTML = '<span class="no-results">No results</span>';
      return;
    }
    for (const r of data.results) {
      const name = basename(r.path);
      const conf = r.confidence ? Math.round(r.confidence * 100) + '%' : '';
      wrap.innerHTML += `
        <div class="search-result" title="${r.path}">
          <div class="sr-name">${name}</div>
          <div class="sr-meta">
            <span>${r.category}</span>
            <span>${ts(r.timestamp)}</span>
            ${conf ? `<span style="color:var(--accent)">${conf}</span>` : ''}
            ${r.source_url ? `<a href="${r.source_url}" target="_blank" onclick="event.stopPropagation()">↗</a>` : ''}
          </div>
        </div>`;
    }
  } catch (e) {
    wrap.innerHTML = `<span class="no-results" style="color:var(--red)">Search error: ${e.message}</span>`;
  }
}

function debouncedSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 300);
}

async function checkServer() {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  try {
    const r = await fetch(BASE + '/health', { signal: AbortSignal.timeout(2000) });
    if (r.ok) {
      dot.className  = 'status-dot ok';
      text.textContent = 'Server online';
      return true;
    }
  } catch { /* fall through */ }
  dot.className  = 'status-dot err';
  text.textContent = 'Server offline — start omni_capture server';
  return false;
}

async function loadAll(showLoader = false) {
  const btn = document.getElementById('refresh-btn');
  if (showLoader) btn.classList.add('loading');

  const ok = await checkServer();
  if (ok) {
    await Promise.all([loadStats(), loadInbox()]);
    await doSearch(); // refresh search results too
  }

  if (showLoader) btn.classList.remove('loading');
}

// Boot
loadAll();
// Auto-refresh every 60 s
setInterval(() => loadAll(), 60_000);
</script>
</body>
</html>
